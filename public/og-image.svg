<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="white" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="white" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Top shine overlay -->
  <rect width="1200" height="315" fill="url(#shine)"/>

  <!-- Pixel art: Calculator icon (top-right area) -->
  <g transform="translate(890, 80)">
    <!-- Calculator body -->
    <rect x="0" y="0" width="200" height="260" rx="12" fill="white" opacity="0.15"/>
    <rect x="8" y="8" width="184" height="244" rx="8" fill="white" opacity="0.1"/>
    <!-- Screen -->
    <rect x="24" y="24" width="152" height="52" rx="6" fill="white" opacity="0.2"/>
    <!-- Screen text: pixel digits -->
    <g fill="white" opacity="0.7">
      <!-- 5,000 displayed on screen in pixel style -->
      <rect x="56" y="38" width="6" height="6"/>
      <rect x="50" y="38" width="6" height="6"/>
      <rect x="50" y="44" width="6" height="6"/>
      <rect x="56" y="44" width="6" height="6"/>
      <rect x="56" y="50" width="6" height="6"/>
      <rect x="50" y="50" width="6" height="6"/>
      <rect x="44" y="38" width="6" height="6"/>
      <rect x="44" y="50" width="6" height="6"/>
      <!-- comma -->
      <rect x="66" y="52" width="4" height="4"/>
      <!-- zeros -->
      <rect x="76" y="38" width="6" height="18" rx="2"/>
      <rect x="88" y="38" width="6" height="18" rx="2"/>
      <rect x="100" y="38" width="6" height="18" rx="2"/>
    </g>
    <!-- Buttons grid (4x4) -->
    <g fill="white" opacity="0.12">
      <rect x="24" y="92" width="32" height="28" rx="4"/>
      <rect x="64" y="92" width="32" height="28" rx="4"/>
      <rect x="104" y="92" width="32" height="28" rx="4"/>
      <rect x="144" y="92" width="32" height="28" rx="4"/>
      <rect x="24" y="128" width="32" height="28" rx="4"/>
      <rect x="64" y="128" width="32" height="28" rx="4"/>
      <rect x="104" y="128" width="32" height="28" rx="4"/>
      <rect x="144" y="128" width="32" height="28" rx="4"/>
      <rect x="24" y="164" width="32" height="28" rx="4"/>
      <rect x="64" y="164" width="32" height="28" rx="4"/>
      <rect x="104" y="164" width="32" height="28" rx="4"/>
      <rect x="144" y="164" width="32" height="28" rx="4"/>
      <rect x="24" y="200" width="72" height="28" rx="4"/>
      <rect x="104" y="200" width="32" height="28" rx="4"/>
    </g>
    <!-- = button highlight -->
    <rect x="144" y="200" width="32" height="28" rx="4" fill="#fbbf24" opacity="0.35"/>
  </g>

  <!-- Pixel art: Floating won coins (decorative) -->
  <!-- Coin 1 (top-left) -->
  <g transform="translate(80, 90)">
    <circle cx="24" cy="24" r="24" fill="#fbbf24" opacity="0.25"/>
    <circle cx="24" cy="24" r="18" fill="#fbbf24" opacity="0.15"/>
    <text x="24" y="30" text-anchor="middle" fill="white" opacity="0.5" font-size="20" font-weight="bold" font-family="sans-serif">W</text>
  </g>

  <!-- Coin 2 (mid-left) -->
  <g transform="translate(140, 420)">
    <circle cx="18" cy="18" r="18" fill="#fbbf24" opacity="0.2"/>
    <circle cx="18" cy="18" r="13" fill="#fbbf24" opacity="0.12"/>
    <text x="18" y="23" text-anchor="middle" fill="white" opacity="0.4" font-size="15" font-weight="bold" font-family="sans-serif">W</text>
  </g>

  <!-- Coin 3 (bottom-right) -->
  <g transform="translate(1040, 460)">
    <circle cx="20" cy="20" r="20" fill="#fbbf24" opacity="0.2"/>
    <circle cx="20" cy="20" r="15" fill="#fbbf24" opacity="0.12"/>
    <text x="20" y="26" text-anchor="middle" fill="white" opacity="0.45" font-size="16" font-weight="bold" font-family="sans-serif">W</text>
  </g>

  <!-- Pixel art sparkles -->
  <g fill="white" opacity="0.3">
    <!-- Sparkle 1 -->
    <rect x="200" y="160" width="4" height="4"/>
    <rect x="196" y="164" width="4" height="4"/>
    <rect x="204" y="164" width="4" height="4"/>
    <rect x="200" y="168" width="4" height="4"/>
    <!-- Sparkle 2 -->
    <rect x="820" y="380" width="3" height="3"/>
    <rect x="817" y="383" width="3" height="3"/>
    <rect x="823" y="383" width="3" height="3"/>
    <rect x="820" y="386" width="3" height="3"/>
    <!-- Sparkle 3 -->
    <rect x="750" y="120" width="3" height="3"/>
    <rect x="747" y="123" width="3" height="3"/>
    <rect x="753" y="123" width="3" height="3"/>
    <rect x="750" y="126" width="3" height="3"/>
  </g>

  <!-- Pixel bar chart (bottom-left decoration) -->
  <g transform="translate(60, 460)" opacity="0.15">
    <rect x="0" y="60" width="20" height="60" fill="white" rx="2"/>
    <rect x="28" y="40" width="20" height="80" fill="white" rx="2"/>
    <rect x="56" y="20" width="20" height="100" fill="white" rx="2"/>
    <rect x="84" y="0" width="20" height="120" fill="white" rx="2"/>
    <rect x="112" y="30" width="20" height="90" fill="#fbbf24" rx="2"/>
  </g>

  <!-- Main text content -->
  <!-- Year badge -->
  <rect x="100" y="170" width="90" height="36" rx="18" fill="white" opacity="0.15"/>
  <text x="145" y="194" text-anchor="middle" fill="white" font-size="16" font-weight="600" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" opacity="0.9">2026</text>

  <!-- Title -->
  <text x="100" y="270" fill="white" font-size="58" font-weight="800" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="-1">
    연봉 실수령액 계산기
  </text>

  <!-- Subtitle -->
  <text x="100" y="330" fill="white" font-size="24" font-weight="400" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" opacity="0.8" letter-spacing="0.5">
    4대보험 · 소득세 · 실수령액 한번에 계산
  </text>

  <!-- Divider line -->
  <rect x="100" y="370" width="60" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Features row -->
  <g transform="translate(100, 405)" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- Feature 1 -->
    <rect x="0" y="0" width="160" height="36" rx="8" fill="white" opacity="0.1"/>
    <text x="80" y="24" text-anchor="middle" fill="white" font-size="14" font-weight="500" opacity="0.75">세전/세후 비교</text>
    <!-- Feature 2 -->
    <rect x="172" y="0" width="180" height="36" rx="8" fill="white" opacity="0.1"/>
    <text x="262" y="24" text-anchor="middle" fill="white" font-size="14" font-weight="500" opacity="0.75">연봉별 비교표</text>
    <!-- Feature 3 -->
    <rect x="364" y="0" width="180" height="36" rx="8" fill="white" opacity="0.1"/>
    <text x="454" y="24" text-anchor="middle" fill="white" font-size="14" font-weight="500" opacity="0.75">이직 시뮬레이터</text>
  </g>

  <!-- URL at bottom -->
  <text x="100" y="550" fill="white" font-size="22" font-weight="600" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" opacity="0.6" letter-spacing="1">
    salary-calc.kr
  </text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="white" opacity="0.08"/>
</svg>